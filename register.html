<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — FORZA FOOD HUB</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins','sans-serif'] } } } }</script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif; margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg,#075985 0%,#0369a1 35%,#0284c7 70%,#0ea5e9 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }

    .auth-card {
      background: #fff; border-radius: 22px; padding: 38px 36px;
      width: 100%; max-width: 500px;
      box-shadow: 0 30px 70px rgba(0,0,0,.22);
    }

    .form-label { font-size: 12.5px; font-weight: 600; color: #475569; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; border: 1.5px solid #e0f2fe; border-radius: 9px;
      padding: 11px 14px; font-family: 'Poppins', sans-serif;
      font-size: 13.5px; color: #0f172a; outline: none; transition: border .2s;
      background: #f8fafc;
    }
    .form-input.with-icon { padding-left: 40px; }
    .form-input:focus { border-color: #0ea5e9; background: #fff; }
    select.form-input { appearance: none; cursor: pointer; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; pointer-events: none; }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 13px; padding: 3px; }

    .btn-main {
      width: 100%; padding: 13px; margin-top: 6px;
      background: linear-gradient(135deg,#0284c7,#0ea5e9);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-main:hover { opacity: .88; }
    .btn-main:disabled { opacity: .55; cursor: default; }

    .err-box {
      background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 9px; padding: 11px 14px; font-size: 13px;
      margin-bottom: 18px; display: none; align-items: center; gap: 9px;
    }
    .err-box.show { display: flex; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:500px){ .form-grid { grid-template-columns: 1fr; } .auth-card { padding: 28px 18px; } }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:26px">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#0284c7,#0ea5e9);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;margin:0 auto 12px;box-shadow:0 8px 20px rgba(14,165,233,.35)">
        <i class="fas fa-utensils"></i>
      </div>
      <h1 style="font-size:1.4rem;font-weight:900;color:#0f172a;margin:0 0 4px">Join FORZA!</h1>
      <p style="font-size:13px;color:#64748b;margin:0">Create your free student account today</p>
    </div>

    <!-- Error -->
    <div class="err-box" id="errBox">
      <i class="fas fa-exclamation-circle" style="flex-shrink:0"></i>
      <span id="errMsg">Something went wrong. Please try again.</span>
    </div>

    <!-- Form -->
    <form id="regForm" onsubmit="handleRegister(event)">
      <div class="form-grid" style="margin-bottom:14px">
        <div>
          <label class="form-label">First Name *</label>
          <input class="form-input" type="text" id="rFname" placeholder="e.g. Adebayo" required />
        </div>
        <div>
          <label class="form-label">Last Name *</label>
          <input class="form-input" type="text" id="rLname" placeholder="e.g. Oyelaran" required />
        </div>
      </div>

      <div class="form-grid" style="margin-bottom:14px">
        <div>
          <label class="form-label">Student ID *</label>
          <input class="form-input" type="text" id="rSid" placeholder="BU/CSC/2022/0471" required />
        </div>
        <div>
          <label class="form-label">Phone Number</label>
          <input class="form-input" type="tel" id="rPhone" placeholder="+234 8XX XXX XXXX" />
        </div>
      </div>

      <div class="form-grid" style="margin-bottom:14px">
        <div>
          <label class="form-label">Faculty</label>
          <select class="form-input" id="rFaculty">
            <option value="">Select faculty…</option>
            <option>Agriculture</option>
            <option>Basic Medical Sciences</option>
            <option>Education</option>
            <option>Engineering &amp; Technology</option>
            <option>Humanities</option>
            <option>Law</option>
            <option>Management Sciences</option>
            <option>Pharmacy</option>
            <option>Science &amp; Technology</option>
            <option>Social Sciences</option>
          </select>
        </div>
        <div>
          <label class="form-label">Level</label>
          <select class="form-input" id="rLevel">
            <option>100 Level</option>
            <option>200 Level</option>
            <option selected>300 Level</option>
            <option>400 Level</option>
            <option>500 Level</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:14px">
        <label class="form-label">Email Address *</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input class="form-input with-icon" type="email" id="rEmail" placeholder="you@bowen.edu.ng" required autocomplete="email" />
        </div>
      </div>

      <div class="form-grid" style="margin-bottom:22px">
        <div>
          <label class="form-label">Password *</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-input with-icon" type="password" id="rPw" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="togglePw('rPw',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div>
          <label class="form-label">Confirm Password *</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input class="form-input with-icon" type="password" id="rPwC" placeholder="Repeat password" required autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="togglePw('rPwC',this)"><i class="fas fa-eye"></i></button>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-main" id="regBtn">
        <i class="fas fa-user-plus" style="margin-right:8px"></i>Create My Account
      </button>
    </form>

    <div style="text-align:center;margin-top:22px">
      <p style="font-size:13.5px;color:#64748b;margin:0">
        Already have an account?
        <a href="login.html" style="color:#0ea5e9;font-weight:700;text-decoration:none;margin-left:4px">Sign In</a>
      </p>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    function showErr(msg) {
      document.getElementById('errMsg').textContent = msg;
      document.getElementById('errBox').classList.add('show');
    }

    // Already logged in → redirect
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });

    async function handleRegister(e) {
      e.preventDefault();
      document.getElementById('errBox').classList.remove('show');

      const fname = document.getElementById('rFname').value.trim();
      const lname = document.getElementById('rLname').value.trim();
      const sid   = document.getElementById('rSid').value.trim();
      const phone = document.getElementById('rPhone').value.trim();
      const faculty = document.getElementById('rFaculty').value;
      const level   = document.getElementById('rLevel').value;
      const email = document.getElementById('rEmail').value.trim();
      const pw    = document.getElementById('rPw').value;
      const pwc   = document.getElementById('rPwC').value;

      if (pw !== pwc) { showErr('Passwords do not match. Please try again.'); return; }
      if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }

      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Creating account…';

      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, pw);
        const uid  = cred.user.uid;

        // Update display name
        await cred.user.updateProfile({ displayName: fname + ' ' + lname });

        // Create user document in Firestore
        await firebase.firestore().collection('users').doc(uid).set({
          firstName:     fname,
          lastName:      lname,
          studentID:     sid,
          phone:         phone,
          email:         email,
          faculty:       faculty,
          level:         level,
          hostel:        '',
          dietaryPrefs:  '',
          memberSince:   firebase.firestore.FieldValue.serverTimestamp(),
          totalOrders:   0,
          totalSpend:    0,
          totalSavings:  0,
          walletBalance: 0,
          activeMealPlan: null,
        });

        window.location.href = 'index.html';
      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'An account with this email already exists.',
          'auth/invalid-email':        'Please enter a valid email address.',
          'auth/weak-password':        'Password is too weak. Use at least 8 characters.',
        };
        showErr(msgs[err.code] || 'Registration failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px"></i>Create My Account';
      }
    }
  </script>
</body>
</html>
