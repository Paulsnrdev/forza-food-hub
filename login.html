<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FORZA FOOD HUB</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins','sans-serif'] } } } }</script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif; margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg,#075985 0%,#0369a1 35%,#0284c7 70%,#0ea5e9 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }

    .auth-card {
      background: #fff; border-radius: 22px; padding: 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 30px 70px rgba(0,0,0,.22);
    }

    .form-label { font-size: 12.5px; font-weight: 600; color: #475569; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; border: 1.5px solid #e0f2fe; border-radius: 9px;
      padding: 11px 14px 11px 40px; font-family: 'Poppins', sans-serif;
      font-size: 13.5px; color: #0f172a; outline: none; transition: border .2s;
      background: #f8fafc;
    }
    .form-input:focus { border-color: #0ea5e9; background: #fff; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; pointer-events: none; }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 13px; padding: 3px; }

    .btn-main {
      width: 100%; padding: 13px; margin-top: 6px;
      background: linear-gradient(135deg,#0284c7,#0ea5e9);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-main:hover { opacity: .88; }
    .btn-main:disabled { opacity: .55; cursor: default; }

    .err-box {
      background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c;
      border-radius: 9px; padding: 11px 14px; font-size: 13px;
      margin-bottom: 18px; display: none; align-items: center; gap: 9px;
    }
    .err-box.show { display: flex; }

    @media(max-width:480px){ .auth-card{ padding: 28px 20px; } }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:30px">
      <div style="width:58px;height:58px;background:linear-gradient(135deg,#0284c7,#0ea5e9);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin:0 auto 14px;box-shadow:0 8px 20px rgba(14,165,233,.35)">
        <i class="fas fa-utensils"></i>
      </div>
      <h1 style="font-size:1.5rem;font-weight:900;color:#0f172a;margin:0 0 5px">Welcome Back!</h1>
      <p style="font-size:13.5px;color:#64748b;margin:0">Sign in to your FORZA account</p>
    </div>

    <!-- Error -->
    <div class="err-box" id="errBox">
      <i class="fas fa-exclamation-circle" style="flex-shrink:0"></i>
      <span id="errMsg">Invalid email or password.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div style="margin-bottom:16px">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@bowen.edu.ng" required autocomplete="email" />
        </div>
      </div>

      <div style="margin-bottom:22px">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input class="form-input" type="password" id="loginPw" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="togglePw('loginPw',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <button type="submit" class="btn-main" id="loginBtn">
        <i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:24px">
      <p style="font-size:13.5px;color:#64748b;margin:0">
        Don't have an account?
        <a href="register.html" style="color:#0ea5e9;font-weight:700;text-decoration:none;margin-left:4px">Create Account</a>
      </p>
    </div>

    <div style="text-align:center;margin-top:18px;padding-top:18px;border-top:1px solid #f0f9ff">
      <a href="index.html" style="font-size:12.5px;color:#94a3b8;text-decoration:none">
        <i class="fas fa-arrow-left" style="margin-right:5px"></i>Browse menu without signing in
      </a>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    function showErr(msg) {
      document.getElementById('errMsg').textContent = msg;
      document.getElementById('errBox').classList.add('show');
    }

    // Already logged in → redirect
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        const ret = sessionStorage.getItem('forzaLoginRedirect') || 'index.html';
        sessionStorage.removeItem('forzaLoginRedirect');
        window.location.href = ret;
      }
    });

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('errBox').classList.remove('show');
      const email = document.getElementById('loginEmail').value.trim();
      const pw    = document.getElementById('loginPw').value;
      const btn   = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Signing in…';

      try {
        await firebase.auth().signInWithEmailAndPassword(email, pw);
        // onAuthStateChanged will redirect
      } catch (err) {
        const msgs = {
          'auth/user-not-found':    'No account found with this email.',
          'auth/wrong-password':    'Incorrect password. Please try again.',
          'auth/invalid-email':     'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
          'auth/invalid-credential':'Invalid email or password.',
        };
        showErr(msgs[err.code] || 'Sign in failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign In';
      }
    }
  </script>
</body>
</html>
